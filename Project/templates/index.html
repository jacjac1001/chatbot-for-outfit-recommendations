<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit Recommendation Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <div class="chat-header">
            <p>Your personal outfit recommendation assistant</p>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="message-wrapper bot-wrapper">
                <div class="bot-message">
                    Good day! Tell me your gender and the weather. <br><br>
                    <small style="opacity: 0.8;">Example: <i>I am male and it is hot today.</i></small>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="What's in your mind?" autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // AI Typewriter Effect (HTML safe)
        async function typeWriter(element, htmlContent, speed = 15) {
            let i = 0;
            element.innerHTML = "";
            let isTag = false;
            let text = "";
            const chatBox = document.getElementById("chat-box");

            while (i < htmlContent.length) {
                // Check if we are typing inside an HTML tag (like <b> or <br>)
                if (htmlContent.charAt(i) === '<') isTag = true;
                text += htmlContent.charAt(i);
                if (htmlContent.charAt(i) === '>') isTag = false;

                // Only render and delay if we aren't halfway through an HTML tag
                if (!isTag) {
                    element.innerHTML = text;
                    chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll as it types
                    await new Promise(resolve => setTimeout(resolve, speed));
                }
                i++;
            }
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();

            if (!message) return;

            const chatBox = document.getElementById("chat-box");

            // 1. Append User Message
            chatBox.insertAdjacentHTML('beforeend', `
                <div class="message-wrapper user-wrapper">
                    <div class="user-message">${message}</div>
                </div>
            `);

            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Add "Typing..." Indicator
            const typingId = "typing-" + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `
                <div id="${typingId}" class="message-wrapper bot-wrapper">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Force a 0.5s "thinking" delay
            await new Promise(resolve => setTimeout(resolve, 500));

            try {
                // 3. Fetch from backend
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // 4. Remove Typing Indicator
                const typingElement = document.getElementById(typingId);
                if (typingElement) typingElement.remove();

                // 5. Setup Bot Message Container
                const msgId = "msg-" + Date.now();
                chatBox.insertAdjacentHTML('beforeend', `
                    <div class="message-wrapper bot-wrapper">
                        <div id="${msgId}" class="bot-message"></div>
                    </div>
                `);

                // 6. Execute AI Typewriter Effect on the text
                await typeWriter(document.getElementById(msgId), data.reply, 15);

                // 7. Append Images (Fading them in after text is done)
                if (data.images && Object.keys(data.images).length > 0) {
                    let imageHtml = `<div class="message-wrapper bot-wrapper fade-in"><div class="outfit-images">`;

                    const items = [
                        { key: 'top', title: 'Top' },
                        { key: 'bottom', title: 'Bottom' },
                        { key: 'shoes', title: 'Shoes' }
                    ];

                    items.forEach(item => {
                        if (data.images[item.key]) {
                            imageHtml += `
                                <div class="item-card">
                                    <h3>${item.title}</h3>
                                    <img src="${data.images[item.key]}" alt="${item.title}">
                                </div>
                            `;
                        }
                    });

                    imageHtml += `</div></div>`;
                    chatBox.insertAdjacentHTML('beforeend', imageHtml);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (error) {
                // Remove typing indicator if there's an error
                const typingElement = document.getElementById(typingId);
                if (typingElement) typingElement.remove();

                chatBox.insertAdjacentHTML('beforeend', `
                    <div class="message-wrapper bot-wrapper">
                        <div class="bot-message" style="color: #dc2626;">Sorry, I'm having trouble connecting right now. Please try again.</div>
                    </div>
                `);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById("user-input").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
